<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">

  <!-- ── Background rounded square ── -->
  <rect width="1024" height="1024" rx="220" fill="#1c2b4a"/>

  <!-- ── Body ── -->
  <ellipse cx="512" cy="640" rx="220" ry="260" fill="#4a3728"/>
  <!-- belly -->
  <ellipse cx="512" cy="680" rx="130" ry="180" fill="#c9a87c"/>
  <!-- belly feather texture lines -->
  <ellipse cx="512" cy="640" rx="80"  ry="110" fill="#d4b98a" opacity="0.5"/>
  <ellipse cx="512" cy="600" rx="50"  ry="70"  fill="#d4b98a" opacity="0.3"/>

  <!-- ── Wings (folded at sides) ── -->
  <!-- left wing -->
  <path d="M292 560 C240 500 210 620 260 720 C280 760 320 780 360 760 L360 600 Z"
        fill="#3a2a1e"/>
  <path d="M292 560 C260 520 230 600 255 680 C268 720 300 745 340 730 L345 590 Z"
        fill="#4a3728"/>
  <!-- right wing -->
  <path d="M732 560 C784 500 814 620 764 720 C744 760 704 780 664 760 L664 600 Z"
        fill="#3a2a1e"/>
  <path d="M732 560 C764 520 794 600 769 680 C756 720 724 745 684 730 L679 590 Z"
        fill="#4a3728"/>

  <!-- ── Feet / talons ── -->
  <!-- left foot -->
  <ellipse cx="420" cy="895" rx="55" ry="22" fill="#c8a040"/>
  <line x1="385" y1="895" x2="370" y2="920" stroke="#c8a040" stroke-width="18" stroke-linecap="round"/>
  <line x1="420" y1="897" x2="415" y2="925" stroke="#c8a040" stroke-width="18" stroke-linecap="round"/>
  <line x1="455" y1="895" x2="462" y2="920" stroke="#c8a040" stroke-width="18" stroke-linecap="round"/>
  <!-- right foot -->
  <ellipse cx="604" cy="895" rx="55" ry="22" fill="#c8a040"/>
  <line x1="569" y1="895" x2="562" y2="920" stroke="#c8a040" stroke-width="18" stroke-linecap="round"/>
  <line x1="604" y1="897" x2="609" y2="925" stroke="#c8a040" stroke-width="18" stroke-linecap="round"/>
  <line x1="639" y1="895" x2="654" y2="920" stroke="#c8a040" stroke-width="18" stroke-linecap="round"/>

  <!-- ── Head ── -->
  <ellipse cx="512" cy="390" rx="195" ry="190" fill="#4a3728"/>

  <!-- ── Ear tufts ── -->
  <!-- left tuft -->
  <path d="M360 260 C350 200 390 170 410 210 C420 235 400 260 380 270 Z" fill="#3a2a1e"/>
  <path d="M365 262 C357 215 388 188 405 218 C413 238 398 258 378 267 Z" fill="#4a3728"/>
  <!-- right tuft -->
  <path d="M664 260 C674 200 634 170 614 210 C604 235 624 260 644 270 Z" fill="#3a2a1e"/>
  <path d="M659 262 C667 215 636 188 619 218 C611 238 626 258 646 267 Z" fill="#4a3728"/>

  <!-- ── Facial disc (lighter ring around face) ── -->
  <ellipse cx="512" cy="410" rx="160" ry="155" fill="#6b4e37" opacity="0.6"/>

  <!-- ── Eyes ── -->
  <!-- left eye outer -->
  <circle cx="440" cy="390" r="72" fill="#c8a040"/>
  <!-- left eye iris -->
  <circle cx="440" cy="390" r="52" fill="#e8b830"/>
  <!-- left eye pupil -->
  <circle cx="440" cy="390" r="32" fill="#1a1a1a"/>
  <!-- left eye gloss -->
  <circle cx="426" cy="374" r="12" fill="#ffffff" opacity="0.7"/>
  <!-- left eye ring -->
  <circle cx="440" cy="390" r="72" fill="none" stroke="#3a2a1e" stroke-width="8"/>

  <!-- right eye outer -->
  <circle cx="584" cy="390" r="72" fill="#c8a040"/>
  <!-- right eye iris -->
  <circle cx="584" cy="390" r="52" fill="#e8b830"/>
  <!-- right eye pupil -->
  <circle cx="584" cy="390" r="32" fill="#1a1a1a"/>
  <!-- right eye gloss -->
  <circle cx="570" cy="374" r="12" fill="#ffffff" opacity="0.7"/>
  <!-- right eye ring -->
  <circle cx="584" cy="390" r="72" fill="none" stroke="#3a2a1e" stroke-width="8"/>

  <!-- ── Beak ── -->
  <path d="M490 450 L512 500 L534 450 Q512 435 490 450 Z" fill="#c8a040"/>
  <line x1="490" y1="450" x2="534" y2="450" stroke="#a07830" stroke-width="5"/>

  <!-- ── Glasses ── -->
  <!-- left lens frame -->
  <circle cx="440" cy="390" r="80" fill="none" stroke="#e8e8e8" stroke-width="14"/>
  <!-- right lens frame -->
  <circle cx="584" cy="390" r="80" fill="none" stroke="#e8e8e8" stroke-width="14"/>
  <!-- bridge -->
  <line x1="520" y1="390" x2="504" y2="390" stroke="#e8e8e8" stroke-width="14" stroke-linecap="round"/>
  <!-- left arm -->
  <line x1="360" y1="370" x2="320" y2="355" stroke="#e8e8e8" stroke-width="14" stroke-linecap="round"/>
  <!-- right arm -->
  <line x1="664" y1="370" x2="704" y2="355" stroke="#e8e8e8" stroke-width="14" stroke-linecap="round"/>

  <!-- ── Graduation/scholar cap (small, tilted) ── -->
  <!-- cap body -->
  <rect x="430" y="198" width="164" height="90" rx="12" fill="#1c2b4a" transform="rotate(-8 512 240)"/>
  <!-- cap board -->
  <rect x="400" y="188" width="224" height="28" rx="8" fill="#152038" transform="rotate(-8 512 200)"/>
  <!-- tassel -->
  <line x1="620" y1="192" x2="645" y2="248" stroke="#e8b830" stroke-width="10" stroke-linecap="round" transform="rotate(-8 512 200)"/>
  <circle cx="648" cy="255" r="14" fill="#e8b830" transform="rotate(-8 512 200)"/>

</svg>
